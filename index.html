<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面積変換</title>
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 120px;
    }

    .card {
      background: #16213e;
      border-radius: 24px;
      padding: 72px 32px 18px;
      width: 520px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .title-box {
      background: #6c63ff;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      width: 100%;
      text-align: center;
    }

    .clear-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .clear-btn {
      height: 52px;
      padding: 0 20px;
      border: none;
      border-radius: 14px;
      background: #e74c3c;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .clear-btn:hover { background: #c0392b; }
    .clear-btn:active { background: #a93226; }

    .converters {
      display: flex;
      gap: 20px;
    }

    .converter {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      height: 52px;
      border: 2px solid #334;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 20px;
      background: #4a8fd6;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .unit {
      font-size: 22px;
      width: 40px;
      flex-shrink: 0;
      text-align: left;
      color: #ccc;
    }

    .sup { font-size: 13px; vertical-align: super; }


    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-box {
      flex: 1;
      height: 52px;
      border-radius: 10px;
      background: #2d2d44;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 20px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title-box">面積変換アプリ</div>
    </div>

    <div class="clear-row">
      <button class="clear-btn" onclick="clearAll()">クリア</button>
    </div>

    <div class="converters">
      <!-- 左：m² → 坪 -->
      <div class="converter">
        <div class="input-row">
          <input type="number" id="sqm-input" placeholder="" min="0">
          <span class="unit">m<span class="sup">2</span></span>
        </div>
        <div class="result-row">
          <div class="result-box" id="tsubo-result"></div>
          <span class="unit">坪</span>
        </div>
      </div>

      <!-- 右：坪 → m² -->
      <div class="converter">
        <div class="input-row">
          <input type="number" id="tsubo-input" placeholder="" min="0">
          <span class="unit">坪</span>
        </div>
        <div class="result-row">
          <div class="result-box" id="sqm-result"></div>
          <span class="unit">m<span class="sup">2</span></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SQM_PER_TSUBO = 3.30579;

    function convertToTsubo() {
      const val = parseFloat(document.getElementById('sqm-input').value);
      const el = document.getElementById('tsubo-result');
      if (isNaN(val) || val < 0) { el.textContent = ''; return; }
      el.textContent = (val / SQM_PER_TSUBO).toFixed(2);
    }

    function convertToSqm() {
      const val = parseFloat(document.getElementById('tsubo-input').value);
      const el = document.getElementById('sqm-result');
      if (isNaN(val) || val < 0) { el.textContent = ''; return; }
      el.textContent = (val * SQM_PER_TSUBO).toFixed(2);
    }

    function clearAll() {
      document.getElementById('sqm-input').value = '';
      document.getElementById('tsubo-input').value = '';
      document.getElementById('tsubo-result').textContent = '';
      document.getElementById('sqm-result').textContent = '';
    }

    document.getElementById('sqm-input').addEventListener('keydown', e => { if (e.key === 'Enter') convertToTsubo(); });
    document.getElementById('tsubo-input').addEventListener('keydown', e => { if (e.key === 'Enter') convertToSqm(); });
  </script>
</body>
</html>
